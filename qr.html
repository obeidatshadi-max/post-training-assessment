<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Post-Training Feedback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    h1 { font-size: 1.2rem; color: #1E293B; margin-bottom: 4px; }
    p  { color: #64748B; font-size: 0.875rem; margin-bottom: 28px; }
    #qrcode { display: inline-block; margin-bottom: 24px; }
    #qrcode img { border-radius: 8px; display: block; }
    .url {
      font-size: 0.8rem;
      color: #2563EB;
      word-break: break-all;
      margin-bottom: 28px;
    }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #2563EB; color: #fff; }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-outline { background: #fff; color: #2563EB; border: 1.5px solid #2563EB; }
    .btn-outline:hover { background: #EFF6FF; }

    @media print {
      body { background: #fff; }
      .btns { display: none; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Post-Training Feedback</h1>
    <p>Scan to start the assessment on your phone</p>
    <div id="qrcode"></div>
    <div class="url">https://post-training-assessment.netlify.app</div>
    <div class="btns">
      <button class="btn-primary" onclick="downloadQR()">⬇ Download PNG</button>
      <button class="btn-outline" onclick="window.print()">🖨 Print</button>
    </div>
  </div>

  <script>
    const QR_API = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data=' +
                   encodeURIComponent('https://post-training-assessment.netlify.app');

    // Display QR image
    const img = document.createElement('img');
    img.src = QR_API;
    img.width = 260;
    img.alt = 'QR Code';
    document.getElementById('qrcode').appendChild(img);

    async function downloadQR() {
      try {
        const res = await fetch(QR_API);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'post-training-feedback-qr.png';
        a.click();
        URL.revokeObjectURL(url);
      } catch(e) {
        // Fallback: open image in new tab → right-click → save
        window.open(QR_API, '_blank');
      }
    }
  </script>
</body>
</html>
