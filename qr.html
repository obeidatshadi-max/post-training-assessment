<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Post-Training Feedback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    h1 { font-size: 1.2rem; color: #1E293B; margin-bottom: 4px; }
    p  { color: #64748B; font-size: 0.875rem; margin-bottom: 28px; }
    #qrcode { display: inline-block; margin-bottom: 24px; }
    #qrcode canvas { border-radius: 8px; }
    .url {
      font-size: 0.8rem;
      color: #2563EB;
      word-break: break-all;
      margin-bottom: 28px;
    }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #2563EB; color: #fff; }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-outline { background: #fff; color: #2563EB; border: 1.5px solid #2563EB; }
    .btn-outline:hover { background: #EFF6FF; }

    @media print {
      body { background: #fff; }
      .btns { display: none; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Post-Training Feedback</h1>
    <p>Scan to start the assessment on your phone</p>
    <div id="qrcode"></div>
    <div class="url">https://post-training-assessment.netlify.app</div>
    <div class="btns">
      <button class="btn-primary" onclick="downloadQR()">⬇ Download PNG</button>
      <button class="btn-outline" onclick="window.print()">🖨 Print</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const ASSESSMENT_URL = 'https://post-training-assessment.netlify.app';
    let qrDataUrl = null;

    QRCode.toDataURL(ASSESSMENT_URL, { width: 260, margin: 2, color: { dark: '#1E293B', light: '#FFFFFF' } }, (err, dataUrl) => {
      if (err) { console.error(err); return; }
      qrDataUrl = dataUrl;
      const img = document.createElement('img');
      img.src = dataUrl;
      img.width = 260;
      img.style.borderRadius = '8px';
      document.getElementById('qrcode').appendChild(img);
    });

    function downloadQR() {
      if (!qrDataUrl) return;
      const link = document.createElement('a');
      link.download = 'post-training-feedback-qr.png';
      link.href = qrDataUrl;
      link.click();
    }
  </script>
</body>
</html>
